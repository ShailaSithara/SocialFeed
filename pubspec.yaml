name: social_feed
description: A beautiful social feed app with vertical video playback
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cached_network_image: ^3.3.0
  dio: ^5.4.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  freezed_annotation: ^3.1.0
  google_fonts: ^6.3.2
  shimmer: ^3.0.0
  video_player: ^2.8.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
